<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=430" />
  <title>STT (음성-텍스트) 테스트</title>
  <style>
    body { font-family: 'Arial', sans-serif; padding: 20px; text-align: center; }
    button { font-size: 1.2em; padding: 10px 20px; margin: 10px 0; cursor: pointer; width: 80%; max-width: 300px; border-radius: 8px; border: none; }
    #stt-toggle-btn { background-color: #90ee90; color: #333; }
    #stt-toggle-btn.recording { background-color: #ff7f7f; color: white; }
    #stt-result { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background-color: #f9f9f9; min-height: 100px; text-align: left; border-radius: 8px; white-space: pre-wrap; }
    #status-message { margin-top: 15px; font-weight: bold; }
    .status-error { color: red; }
    .status-success { color: green; }
  </style>
</head>
<body>
  <h1>🎤 STT (음성-텍스트 변환) 테스트</h1>
  <p>아래 버튼을 눌러 녹음을 시작하고 마이크에 말해보세요.<br>결과가 아래 박스에 표시됩니다.</p>
  <button id="stt-toggle-btn">녹음 시작</button>
  <div id="stt-result">인식된 텍스트가 여기에 표시됩니다...</div>
  <div id="status-message"></div>

  <script type="module">
    // stt.js만 import
    import { startSTT, stopSTT } from './js/stt.js';

    const sttToggleBtn = document.getElementById('stt-toggle-btn');
    const sttResultEl = document.getElementById('stt-result');
    const statusMessageEl = document.getElementById('status-message');

    let isSttRecording = false;
    let finalTranscript = ''; // 최종 인식 결과 저장

    function logStatus(message, isError = false) {
        console.log(`[STATUS] ${message}`);
        statusMessageEl.textContent = message;
        statusMessageEl.className = isError ? 'status-error' : 'status-success';
    }

    // STT 콜백 함수 정의
    const sttCallback = (text) => {
        if (!isSttRecording && text !== null) { // 녹음 중지 후 도착한 결과는 무시 (null은 오류 신호일 수 있음)
            console.log(`STT Callback (무시됨 - 녹음 중 아님): ${text}`);
            return;
        }
        
        if (text && text.trim() !== "") {
            logStatus("음성 인식됨!", false);
            finalTranscript = text.trim(); // 최종 결과 업데이트
            sttResultEl.textContent = `인식된 내용: "${finalTranscript}"`;
            localStorage.setItem('userSpeechForTest', finalTranscript); // 테스트용으로 저장
            console.log("🎙️ STT 결과:", finalTranscript);
        } else if (text !== null) { // 인식은 됐으나 내용이 없는 경우
            logStatus("음성은 인식되었으나 내용이 없습니다.", false);
            sttResultEl.textContent += "\n(내용 없음)";
            localStorage.removeItem('userSpeechForTest');
        } 
        // text === null 인 경우는 stt.js의 onerror나 onend에서 처리하는 것이 더 적합
    };
    
    // stt.js에서 오류 발생 시 호출할 콜백 (stt.js 수정 필요)
    const sttErrorCallback = (error) => {
        logStatus(`STT 오류 발생: ${error}`, true);
        isSttRecording = false;
        sttToggleBtn.textContent = '녹음 시작';
        sttToggleBtn.classList.remove('recording');
        sttToggleBtn.disabled = false;
    };
    
    // stt.js에서 녹음 종료 시 호출할 콜백 (stt.js 수정 필요)
    const sttEndCallback = () => {
        logStatus("STT 녹음이 정상적으로 종료되었습니다.", false);
        // isSttRecording = false; // stopSTT에서 처리하거나 여기서 처리
        // sttToggleBtn.textContent = '녹음 시작';
        // sttToggleBtn.classList.remove('recording');
        // sttToggleBtn.disabled = false;
    };


    sttToggleBtn.addEventListener('click', async () => {
      if (!isSttRecording) {
        // 녹음 시작
        logStatus("녹음 시작 버튼 클릭됨. 마이크 권한 확인 중...", false);
        sttToggleBtn.disabled = true;
        sttToggleBtn.textContent = '권한 확인 중...';
        finalTranscript = ''; // 새 녹음 시작 시 초기화
        sttResultEl.textContent = '마이크에 말씀해주세요...';
        localStorage.removeItem('userSpeechForTest');

        try {
          // navigator.mediaDevices.getUserMedia 호출하여 권한 사전 확인
          logStatus("마이크 접근 시도...", false);
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          logStatus("✅ 마이크 접근 권한 확인됨!", false);
          stream.getTracks().forEach(track => track.stop()); // 확인 후 즉시 스트림 닫기
          logStatus("마이크 스트림 닫힘. STT 시작 요청...", false);

          // STT 시작 (stt.js 내부에서 다시 마이크 접근 시도)
          // stt.js를 수정하여 오류 및 종료 콜백을 받을 수 있다면 전달
          // startSTT(sttCallback, sttErrorCallback, sttEndCallback); 
          startSTT(sttCallback); // 현재 stt.js 구조에 맞춰 콜백만 전달

          // stt.js 내부의 onstart 이벤트가 성공적으로 발생해야 실제 녹음 시작됨
          // 여기서는 일단 UI 변경
          isSttRecording = true;
          sttToggleBtn.textContent = '녹음 중지';
          sttToggleBtn.classList.add('recording');
          sttToggleBtn.disabled = false; // 시작 후 중지 가능하도록 활성화
          logStatus("STT 시작 요청 완료. 말씀해주세요.", false);

        } catch (err) { // 마이크 권한 획득 실패
          console.error("🎤 마이크 접근 실패:", err);
          let errorMessage = err.message || "알 수 없는 오류";
          if (err.name === 'NotAllowedError') errorMessage = "마이크 사용 권한이 거부되었습니다.";
          else if (err.name === 'NotFoundError') errorMessage = "사용 가능한 마이크 장치를 찾을 수 없습니다.";
          else if (err.name === 'NotReadableError') errorMessage = "마이크 장치를 읽을 수 없습니다.";
          logStatus(`❌ 마이크 접근 실패: ${errorMessage}`, true);
          sttToggleBtn.textContent = '녹음 시작';
          sttToggleBtn.disabled = false; // 다시 시도할 수 있도록 활성화
        }
      } else {
        // 녹음 중지
        logStatus("녹음 중지 버튼 클릭됨.", false);
        stopSTT(); // STT 중지 요청
        isSttRecording = false;
        sttToggleBtn.textContent = '녹음 시작';
        sttToggleBtn.classList.remove('recording');
        sttToggleBtn.disabled = false;
        
        // 최종 결과 표시 (stopSTT 후 onend 이벤트가 비동기적으로 발생할 수 있으므로, 
        // onend 콜백에서 최종 결과를 처리하는 것이 더 정확할 수 있음)
        const lastResult = localStorage.getItem('userSpeechForTest');
        if(lastResult) {
            sttResultEl.textContent = `최종 인식 내용: "${lastResult}"`;
            logStatus("녹음 중지됨. 최종 결과 표시.", false);
        } else {
            sttResultEl.textContent = "녹음 중지됨. 인식된 내용 없음.";
            logStatus("녹음 중지됨. 인식된 내용 없음.", false);
        }
      }
    });
  </script>
</body>
</html>
